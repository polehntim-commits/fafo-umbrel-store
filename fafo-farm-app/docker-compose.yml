version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: fafo-farm-app_server_1
      APP_PORT: 5000

  server:
    image: polehntim/farm-app:v0.1.1-alpha
    container_name: fafo-farm-app_server_1
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      APP_DATA_DIR: /data
      FLASK_SECRET_KEY: $APP_SEED
      FLASK_ENV: production
      FLASK_HOST: "0.0.0.0"
      FLASK_HTTPS: "false"
      VAULT_KEY: ""
      FARM_APP_VAULT_SALT: ""
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      MALLOC_ARENA_MAX: "2"
      GUNICORN_WORKERS: "2"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
