services:
  app_proxy:
    environment:
      APP_HOST: fafo-farm-app_server_1
      APP_PORT: 5000

  server:
    image: polehntim/farm-app:v0.1.2-alpha
    container_name: fafo-farm-app_server_1
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "5001:5000"   # Direct API port — bypasses Umbrel's auth proxy for iOS app
    environment:
      APP_DATA_DIR: /data
      FLASK_SECRET_KEY: $APP_SEED
      FLASK_ENV: production
      FLASK_HOST: "0.0.0.0"
      FLASK_HTTPS: "false"
      VAULT_KEY: ""
      FARM_APP_VAULT_SALT: ""
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      MALLOC_ARENA_MAX: "2"
      GUNICORN_WORKERS: "2"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${TOR_DATA_DIR}/app-fafo-farm-app:/tor_data:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/startup-status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # NOTE: No tor_server override needed — Umbrel's default Tor mapping
  # (port 80 → app_proxy → server:5000) is used by iOS.  Adding tor_server
  # without an image breaks install when Tor is disabled in Umbrel settings.
