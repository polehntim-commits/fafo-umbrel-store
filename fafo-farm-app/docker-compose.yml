version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: farm-app_server_1
      APP_PORT: 5000
    image: getumbrel/app-proxy:v1.3.0
    restart: on-failure
    networks:
      default:
        ipv4_address: $APP_FARM_APP_PROXY_IP
    depends_on:
      - server

  server:
    image: polehntim/farm-app:v1.0.0
    restart: on-failure
    stop_grace_period: 1m
    environment:
      APP_DATA_DIR: /data
      FLASK_SECRET_KEY: $APP_SEED
      VAULT_KEY: ""
      SENTINEL_HUB_INSTANCE_ID: ""
      SENTINEL_HUB_CLIENT_ID: ""
      SENTINEL_HUB_CLIENT_SECRET: ""
      BITCOIN_RPC_URL: ""
      BITCOIN_RPC_USER: ""
      BITCOIN_RPC_PASS: ""
    volumes:
      - ${APP_DATA_DIR}/data/farm-app:/data
    networks:
      default:
        ipv4_address: $APP_FARM_APP_SERVER_IP

networks:
  default:
    name: farm-app_main_network
    ipam:
      driver: default
      config:
        - subnet: $APP_FARM_APP_NETWORK
