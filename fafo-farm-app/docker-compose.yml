services:
  app_proxy:
    environment:
      APP_HOST: fafo-farm-app_server_1
      APP_PORT: 5000

  server:
    image: polehntim/farm-app:v0.1.1-alpha
    container_name: fafo-farm-app_server_1
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - "5001:5000"   # Direct API port — bypasses Umbrel's auth proxy for iOS app
    environment:
      APP_DATA_DIR: /data
      FLASK_SECRET_KEY: $APP_SEED
      FLASK_ENV: production
      FLASK_HOST: "0.0.0.0"
      FLASK_HTTPS: "false"
      VAULT_KEY: "Hzc0iKifnxdXEUqf452dZsvKLBbLQwpXzVUDjn9zH4Q="
      FARM_APP_VAULT_SALT: "jSoyo32LIDK3eR9an24LxLJWuJqMPkp1"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      MALLOC_ARENA_MAX: "2"
      GUNICORN_WORKERS: "2"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${TOR_DATA_DIR}/app-fafo-farm-app:/tor_data:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/startup-status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tor_server:
    environment:
      HS_PORTS: '80:app_proxy_fafo-farm-app:5000 5000:${APP_FARM_APP_SERVER_IP}:5000'
