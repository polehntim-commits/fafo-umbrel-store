services:
  app_proxy:
    environment:
      APP_HOST: fafo-farm-app_server_1
      APP_PORT: 5000
    container_name: fafo-farm-app_app_proxy_1

  server:
    image: polehntim/farm-app:v0.1.2-alpha
    container_name: fafo-farm-app_server_1
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - '5001:5000'
    environment:
      APP_DATA_DIR: /data
      FLASK_SECRET_KEY: $APP_SEED
      FLASK_ENV: production
      FLASK_HOST: '0.0.0.0'
      FLASK_HTTPS: 'false'

      # Vault — left empty; auto-generated and persisted on first boot.
      # The owner must visit /unlock after first install to activate vault encryption.
      VAULT_KEY: ''

      # PII Encryption salt — auto-generated and persisted to /data/.vault_salt on first boot.
      # Set this explicitly only when migrating data from another instance.
      FARM_APP_VAULT_SALT: ''

      OPENBLAS_NUM_THREADS: '1'
      OMP_NUM_THREADS: '1'
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      MALLOC_ARENA_MAX: '2'
      GUNICORN_WORKERS: '2'
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${TOR_DATA_DIR}/app-fafo-farm-app:/tor_data:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 512m
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/startup-status']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
