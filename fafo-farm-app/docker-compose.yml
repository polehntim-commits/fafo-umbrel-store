version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: fafo-farm-app_server_1
      APP_PORT: 5000

  server:
    image: polehntim/farm-app:v0.1.2-alpha
    user: "0:0"
    restart: on-failure
    stop_grace_period: 1m
    environment:
      APP_DATA_DIR: /data
      FLASK_SECRET_KEY: $APP_SEED
      FLASK_ENV: production
      FLASK_HOST: "0.0.0.0"
      FLASK_HTTPS: "false"
      VAULT_KEY: ""
      FARM_APP_VAULT_SALT: ""
      GUNICORN_WORKERS: "1"
      OPENBLAS_NUM_THREADS: "1"
      OMP_NUM_THREADS: "1"
      NUMPY_WARN_IF_NO_MEM_POLICY: "0"
    volumes:
      - ${APP_DATA_DIR}/data/fafo-farm-app:/data
