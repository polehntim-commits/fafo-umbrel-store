# ── Cache-Control: force fresh HTML, allow long-cache for assets ─────
# HTML pages: no-cache + must-revalidate so browsers always check
# with server for the latest hashed asset references. Prevents the
# stale-hash 404 pattern where a browser caches HTML with hash X
# but the server has already deployed hash Y.
map $sent_http_content_type $frappe_cache_control {
    default                       "no-cache, must-revalidate";
    ~text/html                    "no-cache, must-revalidate";
    ~text/css                     "public, max-age=31536000, immutable";
    ~application/javascript       "public, max-age=31536000, immutable";
    ~application/json             "no-cache";
    ~image/                       "public, max-age=604800";
    ~font/                        "public, max-age=31536000, immutable";
    ~application/font-            "public, max-age=31536000, immutable";
}

# Emit the header for ALL responses via add_header. `always` ensures
# it applies to non-2xx responses too.
add_header Cache-Control $frappe_cache_control always;
