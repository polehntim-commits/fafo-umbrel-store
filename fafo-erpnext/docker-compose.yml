version: "3.7"

# ERPNext v15 + Agriculture module for Umbrel.
#
# Uses the classic Umbrel community-app pattern:
#   app_proxy → routes public requests to the server container
#   db        → MariaDB 10.6 sidecar (persistence, upgrade separately)
#   server    → single polehntim/erpnext-umbrel:15 image containing
#               all Frappe processes managed by supervisord (backend,
#               frontend/nginx, websocket, workers, scheduler, redis)
#
# This shape matches what BucketLog uses and what Umbrel's community-
# app compose merger reliably accepts. The previous 10-service
# compose was stripped down to zero services because Umbrel silently
# drops names outside its whitelist.
#
# First boot takes 5-10 minutes while the server container's
# `entrypoint.sh` creates the site + installs erpnext + tries to
# install agriculture. Watch: `docker logs -f fafo-erpnext_server_1`.

services:
  app_proxy:
    environment:
      APP_HOST: fafo-erpnext_server_1
      APP_PORT: 8080
      PROXY_AUTH_ADD: "false"

  db:
    image: mariadb:10.6
    restart: on-failure
    stop_grace_period: 1m
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: "${APP_SEED}"
    volumes:
      - ${APP_DATA_DIR}/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-uroot", "-p${APP_SEED}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  server:
    image: polehntim/erpnext-umbrel:15
    restart: on-failure
    stop_grace_period: 2m
    depends_on:
      db:
        condition: service_healthy
    environment:
      SITE_NAME: frontend
      DB_HOST: fafo-erpnext_db_1
      DB_PORT: "3306"
      DB_ROOT_PASS: "${APP_SEED}"
      ADMIN_PASS: "${APP_PASSWORD}"
    volumes:
      - ${APP_DATA_DIR}/sites:/home/frappe/frappe-bench/sites
