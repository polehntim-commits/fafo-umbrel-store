version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: fafo-bank-bridge_server_1
      APP_PORT: 5202

  # Postgres sidecar. v0.4.16: renamed from `db` → `bankbridge-db` to prevent
  # Docker network alias collisions with other Umbrel apps' postgres sidecars
  # (BucketLog, ERPNext, etc. all use `db` too). See app-name-prefix convention
  # in Foundational Design Principles + `/bankbridge/*` path prefix precedent.
  # Original `db` name comment retained for archive: umbreld's community-app
  # compose merger historically stripped services outside its whitelist and
  # `db` was the safest bet — but the collision cost outweighed that safety.
  bankbridge-db:
    image: postgres:16-alpine
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_USER: bankbridge
      POSTGRES_PASSWORD: "${APP_SEED}"
      POSTGRES_DB: bankbridge
      PGTZ: "UTC"
      # v0.3.5 — bankbridge is the SOLE superuser, so if its password ever drifts
      # from APP_SEED nothing can reset it. The init script below creates a
      # deterministic RESCUE superuser (bridgeadmin, password =
      # HMAC(APP_SEED, salt)) on FIRST init so the app's boot self-heal can
      # reconnect and repair drift. DB_RESCUE_SEED falls back to POSTGRES_PASSWORD
      # (= APP_SEED) inside the script. Keep in sync with the server's DB_RESCUE_*.
      DB_RESCUE_USER: bridgeadmin
      DB_RESCUE_SALT: bankbridge-rescue-v1
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
      # Runs ONCE on a fresh volume — creates the bridgeadmin rescue superuser.
      # NOTE: verify this bind survives umbreld's compose merge on a real install
      # (see the `db`-naming comment above); the file ships in the app dir.
      - ./initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankbridge -d bankbridge"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    image: polehntim/bank-bridge:0.1.0
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      bankbridge-db:
        condition: service_healthy
    environment:
      DATA_DIR: /data
      SECRET_KEY: "${APP_SEED}"
      # Postgres — v0.4.16: renamed from `db` → `bankbridge-db` to avoid Docker
      # network alias collisions with other Umbrel apps' postgres sidecars.
      DATABASE_URL: "postgresql://bankbridge:${APP_SEED}@bankbridge-db:5432/bankbridge"
      # Fernet key for encrypting the stored Plaid access_tokens. Left blank on
      # purpose: the app autogenerates a valid key on first boot and persists it
      # to {DATA_DIR}/fernet.key on the data volume below, so it survives
      # restarts and a data-volume restore stays decryptable. (APP_SEED is not a
      # valid Fernet key, so it must NOT be used here.)
      FERNET_KEY: ""
      # Plaid + ERPNext are configured at runtime via the admin UI (persisted
      # to the data volume). Left blank here; set only for a headless deploy.
      PLAID_CLIENT_ID: ""
      PLAID_SECRET: ""
      PLAID_ENV: "sandbox"
      PLAID_REDIRECT_URI: "http://umbrel.local:5202/bankbridge/plaid/oauth_return"
      ERPNEXT_URL: "http://umbrel.local:5300"
      ERPNEXT_API_KEY: ""
      ERPNEXT_API_SECRET: ""
      ERPNEXT_DEFAULT_COMPANY: ""
      SYNC_INTERVAL_HOURS: "6"
      GUNICORN_CMD_ARGS: "--timeout 300 --workers 2"
      # v0.3.5 — boot self-heal of app-role password drift. Must match the db
      # service's DB_RESCUE_* so the app re-derives the same bridgeadmin password.
      # DB_RESCUE_SEED defaults (config.py) to SECRET_KEY (= APP_SEED) here.
      AUTO_RECOVER_DB_AUTH: "true"
      DB_RESCUE_USER: bridgeadmin
      DB_RESCUE_SALT: bankbridge-rescue-v1
    volumes:
      - ${APP_DATA_DIR}/data/fafo-bank-bridge:/data
