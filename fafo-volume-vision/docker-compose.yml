services:
  app_proxy:
    environment:
      APP_HOST: fafo-volume-vision_server_1
      APP_PORT: 5100
    container_name: fafo-volume-vision_app_proxy_1

  server:
    build: .
    container_name: fafo-volume-vision_server_1
    restart: on-failure
    stop_grace_period: 1m
    ports:
      - '5100:5100'
    environment:
      DATA_DIR: /data
      SECRET_KEY: $APP_SEED
      APP_PASSWORD: $APP_SEED
      FLASK_ENV: production
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
    volumes:
      - ${APP_DATA_DIR}/data:/data
    tmpfs:
      - /tmp:size=64m,mode=1777
    mem_limit: 512m
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5100/login']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
