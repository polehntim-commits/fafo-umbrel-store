description: >-
  Volume Vision is a lightweight ML annotation and training data management pipeline
  built for agricultural computer vision workflows.
  Upload images, draw bounding boxes and polygon masks, and export labeled datasets
  to YOLO (bbox and segmentation) or Create ML format with configurable train/val/test
  splits. Manage multiple annotation projects, track annotation progress, and build
  training datasets for on-farm machine learning models.
  Patent Pending — provisional patent filed April 14, 2026.
