version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: fafo-bucketlog_server_1
      APP_PORT: 5200

  postgres:
    image: postgres:16-alpine
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_USER: bucketlog
      # APP_SEED is Umbrel's per-install stable secret. Reusing it here
      # keeps the DB password persistent across container recreations
      # without shipping a fixed default.
      POSTGRES_PASSWORD: "${APP_SEED}"
      POSTGRES_DB: bucketlog
      # Force Postgres to write TZ-aware timestamps in UTC. Everything
      # in the app models is UTC — the DB matching prevents subtle
      # off-by-timezone bugs on reports.
      PGTZ: "UTC"
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bucketlog -d bucketlog"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    image: polehntim/bucketlog:0.1.0
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Direct Flask on 5201 — bypasses the Umbrel app_proxy which
      # requires dashboard cookies and blocks API-key auth from iOS.
      # Same pattern Volume Vision uses (5100 → 5101).
      - "5201:5200"
    environment:
      DATA_DIR: /data
      SECRET_KEY: "${APP_SEED}"
      BOOTSTRAP_API_KEY: "${APP_SEED}"
      NIP98_CLOCK_SKEW_SECONDS: "120"
      # PostgreSQL — the compose network resolves `postgres` to the
      # sidecar container. MVCC eliminates the SQLite lock storms
      # Volume Vision hits under concurrent relay + sync writes.
      DATABASE_URL: "postgresql://bucketlog:${APP_SEED}@postgres:5432/bucketlog"
      RELAY_LIST: "wss://relay.damus.io,wss://nos.lol"
      SUBSCRIBER_ENABLED: "true"
      # Outbound Tor SOCKS5 proxy — used by the Nostr relay subscriber
      # and any peer-federation push paths to reach .onion services.
      # Umbrel provides `tor_proxy:9050` on umbrel_main_network.
      TOR_SOCKS_HOST: tor_proxy
      TOR_SOCKS_PORT: "9050"
      GUNICORN_CMD_ARGS: "--timeout 300 --workers 2"
    volumes:
      - ${APP_DATA_DIR}/data/fafo-bucketlog:/data
