version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: fafo-bucketlog_server_1
      APP_PORT: 5200

  # Postgres sidecar. Renamed from `db` → `bucketlog-db` to prevent
  # Docker network alias collisions with other Umbrel apps' postgres
  # sidecars (Bank Bridge, ERPNext, Nextcloud all name theirs `db` too
  # by default — they share one Docker network on Umbrel, so a bare
  # `db` alias resolves to ALL of them and libpq picks a random address
  # to try; a password rejection on the wrong container is fatal, and
  # Bank Bridge v0.4.16 spent five releases chasing this before naming
  # the alias). Following the app-name-prefix convention from Bank
  # Bridge's docker-compose.yml.
  bucketlog-db:
    image: postgres:16-alpine
    restart: on-failure
    stop_grace_period: 1m
    environment:
      POSTGRES_USER: bucketlog
      POSTGRES_PASSWORD: "${APP_SEED}"
      POSTGRES_DB: bucketlog
      # Force Postgres to write TZ-aware timestamps in UTC.
      PGTZ: "UTC"
    volumes:
      - ${APP_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bucketlog -d bucketlog"]
      interval: 5s
      timeout: 3s
      retries: 20

  server:
    image: polehntim/bucketlog:0.1.0
    restart: on-failure
    stop_grace_period: 1m
    depends_on:
      bucketlog-db:
        condition: service_healthy
    ports:
      # Direct Flask on 5201 — bypasses the Umbrel app_proxy which
      # requires dashboard cookies and blocks API-key auth from iOS.
      # Same pattern Volume Vision uses (5100 → 5101).
      - "5201:5200"
    environment:
      DATA_DIR: /data
      SECRET_KEY: "${APP_SEED}"
      BOOTSTRAP_API_KEY: "${APP_SEED}"
      NIP98_CLOCK_SKEW_SECONDS: "120"
      # PostgreSQL — the compose network resolves `bucketlog-db` to
      # the sidecar container. Renamed from `db` to `bucketlog-db` per
      # the app-name-prefix convention so we don't collide with other
      # Umbrel apps' postgres aliases (see the sidecar service comment
      # above). MVCC eliminates the SQLite lock storms Volume Vision
      # hits under concurrent relay + sync writes.
      DATABASE_URL: "postgresql://bucketlog:${APP_SEED}@bucketlog-db:5432/bucketlog"
      RELAY_LIST: "wss://relay.damus.io,wss://nos.lol"
      SUBSCRIBER_ENABLED: "true"
      # Outbound Tor SOCKS5 proxy — used ONLY by the Nostr relay
      # subscriber to reach .onion relays. NOT used for iOS API
      # sync; iOS uses HTTP on LAN and Nostr for cross-network per
      # the Volume Vision project's architecture (Tor-free client).
      # Umbrel provides `tor_proxy:9050` on umbrel_main_network.
      TOR_SOCKS_HOST: tor_proxy
      TOR_SOCKS_PORT: "9050"
      GUNICORN_CMD_ARGS: "--timeout 300 --workers 2"
    volumes:
      - ${APP_DATA_DIR}/data/fafo-bucketlog:/data
